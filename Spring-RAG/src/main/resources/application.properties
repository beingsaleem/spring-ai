spring.application.name=Spring-RAG

spring.ai.openai.api-key=api-key
spring.init.sql.mode=always
spring.sql.init.schema-locations=classpath:init/schema.sql
spring.main.allow-bean-definition-overriding=true
spring.ai.vectorstore.pgvector.initialize-schema=true

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.ai.vectorstore.redis.index-name=course-index
spring.ai.vectorstore.redis.prefix=course