spring.application.name=chat-memory


spring.ai.openai.api-key=api-key

# Let Spring AI create its memory table automatically
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.platform=mysql
# Standard datasource settings (yours will differ)
spring.datasource.url=jdbc:mysql://localhost:3306/dbname
spring.datasource.username=username
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Connect to your MongoDB (local or Atlas)
spring.data.mongodb.uri=mongodb://username:password@localhost:27017/dbname?authSource=admin
# or, instead of a uri:
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=dbname

# Optional Spring AI MongoDB memory settings
spring.ai.chat.memory.repository.mongo.create-indices=true
# auto-create indices on startup (default false)
spring.ai.chat.memory.repository.mongo.ttl=0
  # time-to-live in seconds, 0 = keep forever

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=password
